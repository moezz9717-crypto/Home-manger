<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#fdf6f8">
<title>منزل محمد وهند ♥️</title>

<!-- إعدادات التطبيق (PWA) للآيفون والأندرويد -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="منزل محمد وهند ♥️">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">

<!-- خطوط جوجل العربية: تحميل غير معطِّل حتى لا يوقف تشغيل التطبيق لو الشبكة بطيئة أو محجوبة -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap"></noscript>

<style>
/* ============================================================
   منظم المنزل الذكي — أنماط التصميم (CSS)
   نظام ألوان قائم على المتغيرات لدعم الوضع الفاتح والداكن
   ============================================================ */

:root{
  /* ألوان الوضع الفاتح */
  --bg1:#fdf6f8;          /* خلفية وردية فاتحة */
  --bg2:#f6eefb;          /* بنفسجي شديد النعومة */
  --bg3:#fbf3ea;          /* بيج رملي */
  --surface:rgba(255,255,255,.72);   /* بطاقات زجاجية */
  --surface-solid:#ffffff;
  --rose:#e6809f;         /* وردي روز أساسي */
  --rose-deep:#cf5f86;
  --lavender:#b89ae0;     /* بنفسجي لافندر */
  --lavender-deep:#9a78cf;
  --sand:#efe2d2;
  --ink:#4a3550;          /* نص أساسي برقوقي */
  --ink-soft:#8a7491;     /* نص ثانوي */
  --line:rgba(120,80,120,.12);
  --done1:#7ed9b5;        /* أخضر مبهج للإنجاز */
  --done2:#5fc59c;
  --shadow:0 14px 40px -18px rgba(150,90,130,.45);
  --shadow-soft:0 6px 20px -12px rgba(150,90,130,.4);
  --radius:24px;
  --radius-sm:16px;
  --fab:#e6809f;
  --glass-border:rgba(255,255,255,.6);
  --display:'El Messiri', 'Tajawal', system-ui, sans-serif;
  --body:'Tajawal', system-ui, -apple-system, 'Segoe UI', sans-serif;
}

html[data-theme="dark"]{
  --bg1:#1d1626;
  --bg2:#241a30;
  --bg3:#1a1422;
  --surface:rgba(48,38,60,.62);
  --surface-solid:#2a2235;
  --rose:#ec9bb6;
  --rose-deep:#e6809f;
  --lavender:#c5aceb;
  --lavender-deep:#b495e3;
  --sand:#3a3145;
  --ink:#f1e7f4;
  --ink-soft:#b6a4c4;
  --line:rgba(220,200,230,.12);
  --shadow:0 18px 44px -16px rgba(0,0,0,.6);
  --shadow-soft:0 8px 22px -12px rgba(0,0,0,.55);
  --glass-border:rgba(255,255,255,.08);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--body);
  color:var(--ink);
  background:
    radial-gradient(140% 100% at 100% 0%, var(--bg2) 0%, transparent 55%),
    radial-gradient(120% 90% at 0% 100%, var(--bg3) 0%, transparent 50%),
    var(--bg1);
  background-attachment:fixed;
  min-height:100dvh;
  overflow-x:hidden;
  transition:background .5s ease, color .3s ease;
  line-height:1.6;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;}
::selection{background:var(--rose);color:#fff;}

/* شريط التمرير */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--lavender);border-radius:8px;opacity:.5;}

/* ============== شاشة البداية (Splash) ============== */
#splash{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  background:
    radial-gradient(120% 120% at 50% 0%, var(--bg2), var(--bg1) 60%, var(--bg3));
  transition:opacity .6s ease, visibility .6s;
}
#splash.hide{opacity:0;visibility:hidden;}
.splash-logo{
  width:120px;height:120px;border-radius:36px;
  display:grid;place-items:center;font-size:58px;
  background:linear-gradient(145deg,var(--rose),var(--lavender));
  box-shadow:0 20px 50px -16px rgba(206,95,134,.6);
  animation:pop .9s cubic-bezier(.2,1.2,.3,1) both, float 3s ease-in-out infinite 1s;
}
.splash-title{font-family:var(--display);font-size:26px;font-weight:700;letter-spacing:.5px;
  animation:fadeUp .7s ease both .3s;}
.splash-sub{color:var(--ink-soft);font-size:14px;animation:fadeUp .7s ease both .45s;}
.splash-loader{width:46px;height:46px;margin-top:6px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--rose);
  animation:spin .8s linear infinite, fadeUp .7s ease both .6s;}

/* ============== التطبيق ============== */
#app{max-width:680px;margin:0 auto;padding:0 16px 120px;min-height:100dvh;
  opacity:0;animation:appIn .6s ease forwards .1s;}
.view{animation:viewIn .42s cubic-bezier(.22,.9,.3,1) both;}

/* ============== الترويسة ============== */
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:10px;
  padding:16px 4px 12px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  background:linear-gradient(var(--bg1), transparent);
}
.icon-btn{
  width:44px;height:44px;border-radius:14px;flex:0 0 auto;
  display:grid;place-items:center;font-size:20px;
  background:var(--surface);border:1px solid var(--glass-border);
  box-shadow:var(--shadow-soft);
  transition:transform .15s ease, background .2s;
}
.icon-btn:active{transform:scale(.9);}
.topbar h1{
  font-family:var(--display);font-size:21px;font-weight:700;margin:0;
  flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar .subtitle{font-size:12px;color:var(--ink-soft);font-weight:500;}
.title-wrap{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}

/* ============== شبكة الأقسام (الرئيسية) ============== */
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
.sec-card{
  position:relative;
  border-radius:var(--radius);
  padding:22px 18px;min-height:148px;
  display:flex;flex-direction:column;justify-content:space-between;gap:10px;
  background:var(--surface);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:transform .18s cubic-bezier(.2,1.3,.3,1), box-shadow .2s;
  -webkit-user-select:none;user-select:none;
}
.sec-card::before{
  content:"";position:absolute;inset:0;opacity:.16;z-index:0;
  background:radial-gradient(120% 120% at 100% 0%, var(--c1,var(--rose)), transparent 60%);
}
.sec-card:active{transform:scale(.96);}
.sec-card .sec-emoji{
  font-size:38px;width:62px;height:62px;border-radius:20px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--c1,var(--rose)),var(--c2,var(--lavender)));
  box-shadow:0 10px 24px -12px var(--c1,var(--rose));z-index:1;
}
.sec-card .sec-name{font-family:var(--display);font-size:18px;font-weight:700;z-index:1;}
.sec-card .sec-meta{font-size:12px;color:var(--ink-soft);z-index:1;font-weight:500;}
.sec-card .card-menu{
  position:absolute;top:10px;left:10px;width:32px;height:32px;border-radius:10px;z-index:2;
  display:grid;place-items:center;font-size:16px;color:var(--ink-soft);
  background:var(--surface-solid);opacity:.85;
}
.sec-card.dragging{opacity:.5;transform:scale(.97);}
.sec-card.drag-over{outline:2px dashed var(--rose);outline-offset:3px;}

/* ============== قائمة الغرف / القوائم الكبيرة ============== */
.big-list{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
.big-btn{
  position:relative;
  display:flex;align-items:center;gap:14px;
  padding:18px 18px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--glass-border);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:var(--shadow-soft);
  transition:transform .16s ease, box-shadow .2s;
  -webkit-user-select:none;user-select:none;
}
.big-btn:active{transform:scale(.98);}
.big-btn .b-emoji{font-size:26px;width:52px;height:52px;border-radius:16px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--rose),var(--lavender));flex:0 0 auto;
  box-shadow:0 8px 18px -10px var(--rose-deep);}
.big-btn .b-text{flex:1;min-width:0;}
.big-btn .b-title{font-family:var(--display);font-weight:600;font-size:17px;}
.big-btn .b-sub{font-size:12px;color:var(--ink-soft);font-weight:500;}
.big-btn .b-go{color:var(--ink-soft);font-size:18px;opacity:.6;}
.big-btn .b-tools{display:flex;gap:4px;}
.big-btn.dragging{opacity:.5;}
.big-btn.drag-over{outline:2px dashed var(--lavender);outline-offset:3px;}
.mini-tool{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:15px;
  color:var(--ink-soft);background:transparent;transition:background .15s, transform .15s;}
.mini-tool:active{transform:scale(.85);}
.drag-handle{cursor:grab;color:var(--ink-soft);opacity:.5;font-size:18px;padding:0 2px;touch-action:none;}

/* ============== بطاقات المهام ============== */
.tasks-wrap{display:flex;flex-direction:column;gap:11px;margin-top:6px;}
.task{
  position:relative;display:flex;align-items:center;gap:14px;
  padding:15px 16px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--glass-border);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:var(--shadow-soft);
  transition:transform .15s ease, background .35s ease, border-color .35s;
  -webkit-user-select:none;user-select:none;overflow:hidden;
}
.task:active{transform:scale(.985);}
.task.done{
  background:linear-gradient(135deg, rgba(126,217,181,.28), rgba(184,154,224,.2));
  border-color:rgba(126,217,181,.5);
}
/* توهج العنصر المختار (بديل علامة الصح) */
.task.done,.meal-item.cooked,.shop-item.bought{
  border-color:rgba(126,217,181,.7) !important;
  box-shadow:0 0 0 1.5px rgba(126,217,181,.55), 0 12px 30px -10px rgba(126,217,181,.6) !important;}
/* خانة النجمة في بداية العنصر */
.sel-slot{width:26px;flex:0 0 auto;display:grid;place-items:center;}
.sel-star{font-size:18px;animation:twinkle 1.5s ease-in-out infinite;filter:drop-shadow(0 2px 5px rgba(126,217,181,.6));}
@keyframes twinkle{0%,100%{transform:scale(1) rotate(0);opacity:.85;}50%{transform:scale(1.28) rotate(14deg);opacity:1;}}
/* شبكة الاختيارات الداخلية: 3 في الصف */
.item-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px;}
.item-cell{position:relative;border-radius:16px;padding:14px 8px;min-height:110px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;text-align:center;background:var(--surface);border:1px solid var(--glass-border);
  box-shadow:var(--shadow-soft);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:transform .15s, box-shadow .3s, border-color .3s, background .3s;-webkit-user-select:none;user-select:none;overflow:hidden;}
.item-cell:active{transform:scale(.95);}
.cell-icon{font-size:28px;width:50px;height:50px;border-radius:15px;display:grid;place-items:center;background:var(--sand);transition:background .3s;flex:0 0 auto;}
.cell-name{font-size:12.5px;font-weight:600;line-height:1.25;max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cell-sub{font-size:10.5px;font-weight:700;color:var(--rose-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:92%;}
.cell-menu{position:absolute;top:5px;inset-inline-start:5px;width:24px;height:24px;border-radius:8px;display:grid;place-items:center;
  font-size:14px;color:var(--ink-soft);background:var(--surface-solid);opacity:.72;z-index:2;}
.cell-qty{position:absolute;top:6px;inset-inline-end:6px;background:var(--sand);color:var(--ink);font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;}
.cell-star{position:absolute;top:4px;inset-inline-end:6px;font-size:15px;animation:twinkle 1.5s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(126,217,181,.6));}
.item-cell.sel{border-color:rgba(126,217,181,.7);background:linear-gradient(135deg,rgba(126,217,181,.22),rgba(184,154,224,.16));
  box-shadow:0 0 0 1.5px rgba(126,217,181,.55), 0 12px 28px -10px rgba(126,217,181,.6);}
.item-cell.sel .cell-icon{background:linear-gradient(145deg,var(--done1),var(--done2));}
@media (min-width:560px){.item-cell{min-height:122px;}.cell-icon{font-size:32px;width:56px;height:56px;}.cell-name{font-size:13.5px;}}
/* نوتة الصفحة الرئيسية */
.note-card{margin-top:16px;background:var(--surface);border:1px solid var(--glass-border);border-radius:18px;
  padding:14px 16px;box-shadow:var(--shadow-soft);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.note-head{font-family:var(--display);font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.note-area{width:100%;min-height:90px;border:none;background:transparent;outline:none;resize:vertical;
  color:var(--ink);font-size:15px;font-family:var(--body);line-height:1.7;}
.note-area::placeholder{color:var(--ink-soft);}
/* زر تحديد كمشترى داخل النافذة */
.buy-toggle{width:100%;padding:13px;border-radius:14px;font-weight:700;font-size:15px;border:1.5px dashed var(--rose);
  color:var(--rose-deep);background:var(--bg1);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.buy-toggle.on{color:#fff;border-style:solid;border-color:transparent;
  background:linear-gradient(135deg,var(--done1),var(--done2));box-shadow:0 8px 20px -10px var(--done2);}
.check{
  width:30px;height:30px;border-radius:50%;flex:0 0 auto;position:relative;
  border:2.5px solid var(--ink-soft);transition:all .3s ease;display:grid;place-items:center;
}
.task.done .check{border-color:transparent;background:linear-gradient(145deg,var(--done1),var(--done2));
  box-shadow:0 6px 16px -6px var(--done2);}
.check svg{width:16px;height:16px;stroke:#fff;stroke-width:3.5;fill:none;
  stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:24;stroke-dashoffset:24;}
.task.done .check svg{animation:draw .4s ease forwards;}
.task .t-text{flex:1;font-size:16px;font-weight:500;transition:color .3s;}
.task.done .t-text{color:var(--done2);}
.task .t-tools{display:flex;gap:2px;opacity:0;transition:opacity .2s;}
.task:hover .t-tools, .task .t-tools.show{opacity:1;}

/* زر الحفظ الكبير */
.save-bar{position:sticky;top:64px;z-index:30;margin:4px 0 14px;}
.btn-primary{
  width:100%;padding:16px;border-radius:18px;font-size:16px;font-weight:700;font-family:var(--display);
  color:#fff;background:linear-gradient(135deg,var(--rose),var(--lavender-deep));
  box-shadow:0 14px 30px -12px var(--rose-deep);
  transition:transform .15s ease, box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{opacity:.5;}
.btn-ghost{
  width:100%;padding:14px;border-radius:16px;font-weight:600;color:var(--ink);
  background:var(--surface);border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);
  transition:transform .15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-ghost:active{transform:scale(.97);}

/* ============== الطلبات (المشتريات) ============== */
.shop-toolbar{display:flex;gap:8px;margin:6px 0 12px;flex-wrap:wrap;}
.search-box{flex:1;min-width:160px;display:flex;align-items:center;gap:8px;
  padding:11px 14px;border-radius:14px;background:var(--surface);border:1px solid var(--glass-border);
  box-shadow:var(--shadow-soft);}
.search-box input{border:none;background:none;outline:none;flex:1;color:var(--ink);font-size:15px;}
.search-box input::placeholder{color:var(--ink-soft);}
.chip{padding:10px 14px;border-radius:14px;font-size:13px;font-weight:600;color:var(--ink-soft);
  background:var(--surface);border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);
  transition:all .2s;}
.chip.active{color:#fff;background:linear-gradient(135deg,var(--rose),var(--lavender));border-color:transparent;}
.shop-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;
  background:var(--surface);border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);
  transition:transform .15s, background .35s;overflow:hidden;}
.shop-item:active{transform:scale(.99);}
.shop-item.bought{background:linear-gradient(135deg,rgba(126,217,181,.22),rgba(184,154,224,.15));}
.shop-item.bought .si-name{text-decoration:line-through;color:var(--ink-soft);}
.si-body{flex:1;min-width:0;}
.si-name{font-weight:600;font-size:15px;}
.si-meta{font-size:12px;color:var(--ink-soft);}
.qty-badge{background:var(--sand);color:var(--ink);font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px;}
.price-badge{background:linear-gradient(135deg,var(--rose),var(--lavender));color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex:0 0 auto;}
.lh-total{font-size:12px;font-weight:700;color:var(--rose-deep);background:var(--sand);padding:2px 10px;border-radius:20px;flex:0 0 auto;}
.list-head{display:flex;align-items:center;gap:10px;margin:18px 0 8px;}
.list-head .lh-title{font-family:var(--display);font-weight:700;font-size:17px;flex:1;}
.list-head .lh-line{height:2px;flex:1;background:linear-gradient(to left,var(--line),transparent);border-radius:2px;}

/* ============== الأكل ============== */
.meal-tabs{display:flex;gap:8px;margin:6px 0 14px;}
.meal-tab{flex:1;padding:13px;border-radius:16px;font-weight:700;font-family:var(--display);font-size:15px;
  background:var(--surface);border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);
  color:var(--ink-soft);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.meal-tab .mt-emoji{font-size:20px;}
.meal-tab.active{color:#fff;background:linear-gradient(135deg,var(--rose),var(--lavender));border-color:transparent;
  box-shadow:0 12px 26px -12px var(--rose-deep);}
.meal-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;
  background:var(--surface);border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);
  transition:transform .15s, background .35s;overflow:hidden;}
.meal-item.cooked{background:linear-gradient(135deg,rgba(126,217,181,.22),rgba(184,154,224,.15));}
.meal-item .mi-emoji{font-size:22px;width:44px;height:44px;border-radius:13px;display:grid;place-items:center;
  background:var(--sand);flex:0 0 auto;}
.mi-body{flex:1;min-width:0;}
.mi-name{font-weight:600;font-size:15px;}
.mi-note{font-size:12px;color:var(--ink-soft);}

/* خطة أسبوعية */
.week-grid{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.day-row{display:flex;gap:10px;padding:12px 14px;border-radius:14px;align-items:flex-start;
  background:var(--surface);border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);}
.day-name{font-family:var(--display);font-weight:700;width:64px;flex:0 0 auto;color:var(--rose-deep);}
.day-meals{flex:1;font-size:14px;color:var(--ink-soft);}
.day-meals span{color:var(--ink);}

/* ============== السجل ============== */
.log-card{padding:16px;border-radius:var(--radius-sm);background:var(--surface);
  border:1px solid var(--glass-border);box-shadow:var(--shadow-soft);margin-bottom:12px;overflow:hidden;}
.log-date{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.log-date .ld-day{font-family:var(--display);font-weight:700;font-size:16px;}
.log-date .ld-full{font-size:12px;color:var(--ink-soft);}
.log-group{margin-top:8px;}

}
.field input:focus, .field textarea:focus, .field select:focus{border-color:var(--rose);}

/* ============== التنبيهات (Toast) ============== */
#toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:300;
  display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:420px;align-items:center;}
.toast{
  display:flex;align-items:center;gap:10px;padding:13px 18px;border-radius:16px;
  background:var(--surface-solid);border:1px solid var(--glass-border);

  font-weight:600;font-size:14px;max-width:100%;

}
.toast .t-ic{font-size:20px;}
.toast.success{border-right:4px solid var(--done2);}
.toast.info{border-right:4px solid var(--lavender);}
.toast.warn{border-right:4px solid #e8a04a;}

/* رشّة النجوم عند الحفظ */
.spark{position:fixed;font-size:20px;pointer-events:none;z-index:350;
  animation:spark .9s ease-out forwards;}

/* ============== شاشة الترحيب ============== */
.welcome{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:30px;

.welcome .w-feat span{font-size:24px;}

/* ============== الأنيميشن (Keyframes) ============== */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pop{0%{transform:scale(.3);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes appIn{to{opacity:1;}}
@keyframes viewIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes draw{to{stroke-dashoffset:0;}}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateY(-16px) scale(.95);}}
@keyframes spark{0%{transform:translate(0,0) scale(.4) rotate(0deg);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) scale(1.1) rotate(var(--rot));opacity:0;}}
@keyframes itemIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.anim-in{animation:itemIn .35s ease both;}

/* احترام تفضيل تقليل الحركة */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;transition-duration:.05ms !important;}
}

/* تركيز واضح للوصولية */
button:focus-visible, input:focus-visible, .sec-card:focus-visible, .big-btn:focus-visible{
  outline:3px solid var(--lavender-deep);outline-offset:2px;
}

@media (min-width:560px){
  .section-grid{gap:18px;}
  .sec-card{min-height:170px;padding:24px;}
}

<script>

   ============================================================ */
"use strict";

// مجموعة الأيقونات المتاحة للاختيار
const EMOJIS = ["🛋️","🍽️","🛒","🍲","🛏️","🚿","🧺","🧹","🧼","👶","🪟","🌿","☕","🥗","🍳","🧊","🚪","💡","🧴","📦","🛁","🪑","🍱","🥘","🧽","🌸","💐","✨","📋","🗓️"];

/* ============== أدوات مساعدة ============== */
const $ = (sel, root=document) => root.querySelector(sel);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  [["بوتاجاز","فرن","طبخ","موقد"],"🔥"],[["ثلاجة","تلاجة"],"🧊"],[["قمامة","زبالة","نفايات"],"🗑️"],
  [["مرحاض","تواليت","حمام"],"🚽"],[["حوض","مغسلة","بانيو"],"🛁"],[["مناشف","منشفة","فوط"],"🧻"],[["تعقيم","معقم","مطهر"],"🧴"],
  [["أرض","ارض","بلاط","سيراميك"],"🧹"],[["كنس","مكنسة"],"🧹"],[["دولاب","خزانة","دواليب"],"🚪"],[["ألعاب","العاب","لعب"],"🧸"],

];
const guessEmoji = (text, fallback) => {
  const t = String(text||"");
  for(const [keys, emo] of EMOJI_MAP) if(keys.some(k=> t.includes(k))) return emo;

// اهتزاز بسيط على الهواتف (إن كان مدعوماً)
function buzz(ms=12){ if(navigator.vibrate) try{ navigator.vibrate(ms); }catch(e){} }

// تاريخ اليوم بصيغة YYYY-MM-DD
function todayKey(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
// تنسيق التاريخ للعرض بالعربية
function prettyDate(key){
  const [y,m,dd] = key.split("-").map(Number);
  const d = new Date(y, m-1, dd);
  return { day: DAYS_AR[d.getDay()], full: dd+" "+MONTHS_AR[m-1]+" "+y };
}

/* ============== التخزين المحلي ============== */
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
  catch(e){ toast("تعذّر الحفظ على الجهاز","warn","⚠️"); }
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ data = JSON.parse(raw); return true; }
  }catch(e){}
  return false;
}

/* ============== البيانات الافتراضية ============== */
function makeTasks(arr){ return arr.map(t => ({id:uid(), text:t, done:false})); }

        { id:uid(), name:"الصالة", emoji:"🛋️", tasks: makeTasks(["ترويق","كنس","مسح الأرضية","تنظيف الشبابيك","ترتيب الأثاث","تنظيف التراب","تغيير المفارش"]) },
        { id:uid(), name:"أوضة الأطفال", emoji:"👶", tasks: makeTasks(["ترتيب الألعاب","تغيير المفارش","كنس الأرضية","تنظيف المكتب"]) },

        { id:uid(), name:"الحمام", emoji:"🚿", tasks: makeTasks(["تنظيف الحوض","تنظيف المرحاض","غسل الأرضية","تغيير المناشف","تعقيم الأسطح"]) },

        week:{} },

}

/* ============== التنبيهات (Toast) ============== */
function toast(msg, type="success", icon="✅"){
  const wrap = $("#toast-wrap");
  const el = document.createElement("div");
  el.className = "toast "+type;
  el.innerHTML = `<span class="t-ic">${icon}</span><span>${esc(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(()=> el.remove(), 3100);
}

/* رشّة نجوم احتفالية حول نقطة معينة */
function sparkle(x, y){
  const emojis = ["✨","🌸","💖","⭐","💫","🌟"];
  for(let i=0;i<14;i++){
    const s = document.createElement("div");
    s.className = "spark";
    s.textContent = emojis[i % emojis.length];
    const ang = (Math.PI*2/14)*i + Math.random();
    const dist = 60 + Math.random()*70;
    s.style.left = x+"px"; s.style.top = y+"px";
    s.style.setProperty("--dx", Math.cos(ang)*dist+"px");
    s.style.setProperty("--dy", (Math.sin(ang)*dist - 30)+"px");
    s.style.setProperty("--rot", (Math.random()*360-180)+"deg");
    document.body.appendChild(s);
    setTimeout(()=> s.remove(), 950);
  }
}

/* ============== النوافذ المنبثقة (Modal) ============== */
function openModal(html){
  const box = $("#modalBox");
  box.innerHTML = `<div class="modal-grip"></div>` + html;

  // إغلاق عند الضغط على الخلفية

/* ============== التنقل بين الصفحات ============== */
function navigate(view, params={}){ nav.push({view, ...params}); render(); }
function back(){ if(nav.length>1){ nav.pop(); render(); } }
function goHome(){ nav = [{view:"home"}]; render(); }

// إيجاد العناصر من الحالة
const getSection = id => data.sections.find(s=>s.id===id);
const getRoom = (sec, id) => sec.rooms.find(r=>r.id===id);

/* ============== العرض الرئيسي (Render) ============== */
function render(){
  const app = $("#app");
  const cur = nav[nav.length-1];
  let html = "";
  if(cur.view==="home") html = viewHome();
  else if(cur.view==="section"){
    const sec = getSection(cur.sectionId);
    if(!sec){ goHome(); return; }
    if(sec.type==="rooms") html = viewRoomsSection(sec);
    else if(sec.type==="shopping") html = viewShopping(sec);
    else if(sec.type==="meals") html = viewMeals(sec);
  }
  else if(cur.view==="room") html = viewRoom(cur.sectionId, cur.roomId);
  else if(cur.view==="log") html = viewLog();
  else if(cur.view==="settings") html = viewSettings();

  app.innerHTML = `<div class="view">${html}</div>`;
  // تفعيل خصائص الصفحة بعد رسمها
  attachHandlers(cur);
  window.scrollTo({top:0, behavior:"instant"});
}

// ترويسة قابلة لإعادة الاستخدام
function topbar(title, subtitle, opts={}){
  const backBtn = opts.back!==false ? `<button class="icon-btn" data-act="back" aria-label="رجوع">→</button>` : "";
  const right = opts.right || "";
  return `<div class="topbar">
    ${backBtn}
    <div class="title-wrap">
      <h1>${esc(title)}</h1>
      ${subtitle?`<span class="subtitle">${esc(subtitle)}</span>`:""}
    </div>
    ${right}
  </div>`;
}

// وصف مختصر لكل قسم حسب نوعه
function sectionMeta(s){
  if(s.type==="rooms"){ const n=s.rooms.length; return n+" "+(n===1?"غرفة":n===2?"غرفتان":"غرف"); }
  if(s.type==="shopping"){ const n=s.lists.reduce((a,l)=>a+l.items.length,0); return n+" عنصر"; }
  if(s.type==="meals"){ const n=s.meals.breakfast.length+s.meals.lunch.length+s.meals.dinner.length; return n+" صنف"; }
  return "";
}

/* ============== صفحة: قسم الغرف (الشقة / المطبخ والحمام) ============== */
function viewRoomsSection(sec){
  const rooms = sec.rooms.map(r=>{
    const done = r.tasks.filter(t=>t.done).length;
    return `<div class="big-btn" data-id="${r.id}" draggable="true">
        <span class="drag-handle" data-act="none">⋮⋮</span>
        <div class="b-emoji">${r.emoji||"🚪"}</div>
        <div class="b-text" data-act="open-room" data-id="${r.id}">
          <div class="b-title">${esc(r.name)}</div>
          <div class="b-sub">${r.tasks.length} مهمة${done?` · ${done} مكتملة`:""}</div>
        </div>
        <div class="b-tools">
          <button class="mini-tool" data-act="edit-room" data-id="${r.id}">✏️</button>
          <button class="mini-tool" data-act="del-room" data-id="${r.id}">🗑️</button>
        </div>
      </div>`;

  const body = sec.rooms.length ? `<div class="big-list" id="roomList">${rooms}</div>`

}

/* ============== صفحة: مهام الغرفة ============== */
function viewRoom(sectionId, roomId){
  const sec = getSection(sectionId);
  const room = sec && getRoom(sec, roomId);
  if(!room){ back(); return ""; }
  const doneCount = room.tasks.filter(t=>t.done).length;

  const tasks = room.tasks.map(t=>`
    <div class="item-cell ${t.done?'sel':''}" data-id="${t.id}" data-act="toggle-task">
      <button class="cell-menu" data-act="task-menu" data-id="${t.id}">⋯</button>
      ${t.done?`<span class="cell-star">✨</span>`:""}
      <div class="cell-icon">${guessEmoji(t.text,"🫧")}</div>
      <div class="cell-name">${esc(t.text)}</div>
    </div>`).join("");

  const body = room.tasks.length ? `<div class="item-grid" id="taskList">${tasks}</div>`
    : emptyState("✨","لا توجد مهام","اضغط زر + لإضافة مهمة جديدة");

  return topbar(room.name, sec.name+" · "+room.tasks.length+" مهمة") +
    topActions("add-task", "مهمة", "save-day-tasks", `💾 حفظ${doneCount?` (${doneCount})`:""}`, !doneCount) + body;
}

/* ============== صفحة: الطلبات (المشتريات) ============== */
function viewShopping(sec){
  const toolbar = `<div class="shop-toolbar">
      <div class="search-box">
        <span>🔍</span>
        <input id="shopSearch" placeholder="ابحث في الطلبات..." value="${esc(shopQuery)}">
      </div>
    </div>
    <div class="shop-toolbar">
      <button class="chip ${shopFilter==='all'?'active':''}" data-act="shop-filter" data-f="all">الكل</button>
      <button class="chip ${shopFilter==='left'?'active':''}" data-act="shop-filter" data-f="left">المتبقي</button>
      <button class="chip ${shopFilter==='bought'?'active':''}" data-act="shop-filter" data-f="bought">المحدد</button>
    </div>`;

  let lists = "";
  let totalBought = 0, boughtSum = 0, grandTotal = 0;
  sec.lists.forEach(list=>{
    let items = list.items.filter(it=>{
      if(shopFilter==="left" && it.bought) return false;
      if(shopFilter==="bought" && !it.bought) return false;
      if(shopQuery && !it.text.includes(shopQuery)) return false;
      return true;
    });
    // فرز حسب الحالة: المتبقي أولاً
    items = items.slice().sort((a,b)=> (a.bought===b.bought)?0:(a.bought?1:-1));
    const listSum = list.items.reduce((a,i)=> a+(Number(i.price)||0), 0);
    grandTotal += listSum;
    list.items.forEach(i=>{ if(i.bought){ totalBought++; boughtSum += Number(i.price)||0; } });

    const rows = items.map(it=>`
      <div class="item-cell ${it.bought?'sel':''}" data-id="${it.id}" data-list="${list.id}" data-act="toggle-item">
        <button class="cell-menu" data-act="item-menu" data-id="${it.id}" data-list="${list.id}">⋯</button>
        ${it.bought?`<span class="cell-star">✨</span>`:(it.qty>1?`<span class="cell-qty">×${it.qty}</span>`:"")}
        <div class="cell-icon">${guessEmoji(it.text,"🛍️")}</div>
        <div class="cell-name">${esc(it.text)}</div>
        ${it.price>0?`<div class="cell-sub">${fmt(it.price)} ج.م</div>`:""}
      </div>`).join("");

    lists += `<div class="list-head">
        <span class="lh-title">${esc(list.name)}</span>
        ${listSum>0?`<span class="lh-total">${fmt(listSum)} ج.م</span>`:""}
        <span class="lh-line"></span>
        <button class="mini-tool" data-act="add-item" data-list="${list.id}">➕</button>
        <button class="mini-tool" data-act="edit-list" data-list="${list.id}">✏️</button>
        <button class="mini-tool" data-act="del-list" data-list="${list.id}">🗑️</button>
      </div>`;
    lists += items.length ? `<div class="item-grid">${rows}</div>` : `<div class="empty" style="padding:14px"><div class="e-sub">لا توجد عناصر مطابقة</div></div>`;
  });

  const body = sec.lists.length ? lists : emptyState("🛒","لا توجد قوائم","اضغط زر + لإنشاء قائمة طلبات");

  const sub = sectionMeta(sec) + (grandTotal>0?` · إجمالي ${fmt(grandTotal)} ج.م`:"");
  const saveLabel = `🛍️ حفظ${totalBought?` (${totalBought})`:""}${boughtSum>0?` · ${fmt(boughtSum)} ج.م`:""}`;
  return topbar(sec.name, sub) +
    topActions("add-list", "قائمة", "save-bought", saveLabel, !totalBought) + toolbar + body;
}

  const meals = sec.meals[mealTab] || [];

  const rows = meals.map(m=>`

    : emptyState("🍽️","لا توجد أصناف","اضغط زر + لإضافة صنف لهذه الوجبة");

  // الخطة الأسبوعية
  const weekDays = ["السبت","الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة"];
  const week = weekDays.map(d=>`
    <div class="day-row">

      <input class="day-input" data-act="week-plan" data-day="${d}"

        style="flex:1;border:none;background:none;outline:none;color:var(--ink);font-size:14px">

  return topbar(sec.name, sectionMeta(sec)) +
    topActions("add-meal", "صنف", "save-cooked", `🍲 حفظ${(()=>{const tc=["breakfast","lunch","dinner"].reduce((a,k)=>a+sec.meals[k].filter(m=>m.cooked).length,0);return tc?` (${tc})`:"";})()}`, !["breakfast","lunch","dinner"].some(k=>sec.meals[k].some(m=>m.cooked))) +
    `<div class="meal-tabs">${tabs}</div>` + body +
    `<div class="section-title">🗓️ الخطة الأسبوعية</div><div class="week-grid">${week}</div>`;
}

      <button class="chip" data-act="export-txt">🖨️ تقرير نصي</button>
    </div>`;

  let body;

    body = emptyState("📔","السجل فارغ","إنجازاتك المحفوظة هتظهر هنا يوماً بيوم");

      return `<div class="log-card">
        <div class="log-date">
          <div class="b-emoji" style="width:42px;height:42px;font-size:18px">📅</div>
          <div style="flex:1">

            <div class="ld-full">${p.full}</div>

          <button class="mini-tool" data-act="del-log-day" data-date="${l.date}">🗑️</button>

  return topbar("السجل اليومي", data.log.length+" يوم محفوظ") + toolbar + body;

/* ============== إضافة المهام إلى السجل ============== */
function appendToLog(category, items){
  if(!items.length) return;
  const key = selDate || todayKey();
  let entry = data.log.find(l=>l.date===key);
  if(!entry){ entry = {date:key, tasks:[], purchases:[], meals:[]}; data.log.push(entry); }
  entry[category] = entry[category].concat(items);
  save();
}

// قائمة إجراءات صغيرة (تعديل/حذف) لزر ⋯
function actionMenu(title, actions){
  const rows = actions.map((a,i)=>`<div class="set-row" data-mi="${i}">
      <div class="sr-emoji" ${a.danger?`style="background:linear-gradient(145deg,#e8718a,#d65a76)"`:""}>${a.emoji}</div>
      <div class="sr-text"><div class="sr-title">${esc(a.label)}</div></div></div>`).join("");
  openModal(`<h3>${esc(title)}</h3><div class="settings-list">${rows}</div>
    <div class="modal-actions"><button class="btn-cancel" id="amClose">إغلاق</button></div>`);

/* ============== معالجة الأحداث ============== */
function attachHandlers(cur){
  const app = $("#app");

  // نقرة عامة عبر تفويض الأحداث
  app.onclick = (e)=>{
    const t = e.target.closest("[data-act]");
    if(!t) return;
    const act = t.dataset.act;
    const id = t.dataset.id;
    handleAction(act, t, e);
  };

  // البحث في الطلبات
  const ss = $("#shopSearch");
  if(ss) ss.oninput = ()=>{ shopQuery = ss.value; refreshShopOnly(); };
  // البحث في السجل
  const ls = $("#logSearch");
  if(ls) ls.oninput = ()=>{ window.__logQuery = ls.value; render(); $("#logSearch").focus(); };
  // الخطة الأسبوعية
  app.querySelectorAll(".day-input").forEach(inp=>{
    inp.onchange = ()=>{
      const sec = getSection(cur.sectionId);
      sec.week[inp.dataset.day] = inp.value.trim();
      save(); toast("تم حفظ الخطة","success","🗓️");
    };
  });
  // استيراد ملف
  const imp = $("#importFile");
  if(imp) imp.onchange = handleImportFile;

  // نوتة الصفحة الرئيسية (حفظ عند مغادرة الحقل)
  const note = $("#homeNote");
  if(note) note.onblur = ()=>{ if(note.value !== (data.note||"")){ data.note = note.value; save(); } };

  // خانة التاريخ (تحديد يوم الحفظ في السجل)
  const dp = $("#datePick");
  if(dp) dp.onchange = ()=>{ selDate = dp.value || todayKey(); };

  // تفعيل السحب وإعادة الترتيب
  if(cur.view==="home") setupSort($("#secGrid"), ".sec-card", (order)=>{
    data.sections.sort((a,b)=> order.indexOf(a.id)-order.indexOf(b.id)); save();
  });
  if(cur.view==="section"){
    const sec = getSection(cur.sectionId);
    if(sec && sec.type==="rooms") setupSort($("#roomList"), ".big-btn", (order)=>{
      sec.rooms.sort((a,b)=> order.indexOf(a.id)-order.indexOf(b.id)); save();
    });
  }
  // ملاحظة: الكروت الداخلية (المهام/الطلبات/الأكل) لا تُعاد ترتيبها بالسحب
}

// تحديث قسم الطلبات فقط (بدون فقدان تركيز البحث)
function refreshShopOnly(){
  const cur = nav[nav.length-1];
  const sec = getSection(cur.sectionId);
  render();
  const ss = $("#shopSearch");
  if(ss){ ss.focus(); ss.setSelectionRange(ss.value.length, ss.value.length); }
}

/* ============== جدول الإجراءات ============== */
function handleAction(act, el, ev){
  const cur = nav[nav.length-1];
  buzz(8);

  switch(act){
    /* ---- تنقل ---- */
    case "back": back(); break;
    case "settings": navigate("settings"); break;
    case "log": window.__logQuery=""; navigate("log"); break;
    case "open-section": navigate("section",{sectionId:el.dataset.id}); break;
    case "open-room": navigate("room",{sectionId:cur.sectionId, roomId:el.dataset.id}); break;

    /* ---- إدارة الأقسام (الرئيسية) ---- */
    case "add-section": addSection(); break;
    case "section-menu": sectionMenu(el.dataset.id); ev.stopPropagation(); break;

    /* ---- إدارة الغرف ---- */
    case "add-room": addRoom(cur.sectionId); break;
    case "edit-room": editRoom(cur.sectionId, el.dataset.id); break;
    case "del-room": delRoom(cur.sectionId, el.dataset.id); break;

    /* ---- إدارة المهام ---- */
    case "add-task": addTask(cur.sectionId, cur.roomId); break;
    case "edit-task": editTask(cur.sectionId, cur.roomId, el.dataset.id); break;
    case "del-task": delTask(cur.sectionId, cur.roomId, el.dataset.id); break;
    case "task-menu": taskMenu(cur.sectionId, cur.roomId, el.dataset.id); break;
    case "toggle-task": toggleTask(cur.sectionId, cur.roomId, el.dataset.id, ev); break;
    case "save-day-tasks": saveDayTasks(cur.sectionId, cur.roomId, ev); break;

    /* ---- إدارة الطلبات ---- */
    case "add-list": addList(cur.sectionId); break;
    case "edit-list": editList(cur.sectionId, el.dataset.list); break;
    case "del-list": delList(cur.sectionId, el.dataset.list); break;
    case "add-item": addItem(cur.sectionId, el.dataset.list); break;
    case "edit-item": editItem(cur.sectionId, el.dataset.list, el.dataset.id); break;
    case "open-item": editItem(cur.sectionId, el.dataset.list, el.dataset.id); break;
    case "item-menu": productMenu(cur.sectionId, el.dataset.list, el.dataset.id); break;
    case "del-item": delItem(cur.sectionId, el.dataset.list, el.dataset.id); break;
    case "toggle-item": toggleItem(cur.sectionId, el.dataset.list, el.dataset.id, ev); break;
    case "shop-filter": shopFilter = el.dataset.f; render(); break;
    case "save-bought": saveBought(cur.sectionId, ev); break;

    /* ---- إدارة الأكل ---- */
    case "meal-tab": mealTab = el.dataset.k; render(); break;
    case "add-meal": addMeal(cur.sectionId); break;
    case "edit-meal": editMeal(cur.sectionId, el.dataset.id); break;
    case "del-meal": delMeal(cur.sectionId, el.dataset.id); break;
    case "meal-menu": mealMenu(cur.sectionId, el.dataset.id); break;
    case "toggle-meal": toggleMeal(cur.sectionId, el.dataset.id, ev); break;
    case "save-cooked": saveCooked(cur.sectionId, ev); break;

    /* ---- السجل ---- */
    case "del-log-day": delLogDay(el.dataset.date); break;
    case "del-log-item": delLogItem(el.dataset.date, el.dataset.cat, +el.dataset.idx); break;

    /* ---- الإعدادات ---- */
    case "toggle-theme": toggleTheme(); break;
    case "rename-app": renameApp(); break;
    case "export-json": exportJSON(); break;
    case "import-json": $("#importFile").click(); break;
    case "export-txt": exportTXT(); break;
    case "reset-app": resetApp(); break;
  }
}

}
function editTask(sectionId, roomId, taskId){
  const room = getRoom(getSection(sectionId), roomId);
  const tk = room.tasks.find(t=>t.id===taskId);
  inputDialog({ title:"تعديل المهمة", value:tk.text, confirmText:"حفظ",
    onConfirm:(text)=>{ tk.text=text; save(); render(); toast("تم التعديل","success","✏️"); }});

function delTask(sectionId, roomId, taskId){
  const room = getRoom(getSection(sectionId), roomId);
  const tk = room.tasks.find(t=>t.id===taskId);
  confirmDialog("حذف المهمة؟", `حذف "${tk.text}"`,
    ()=>{ room.tasks = room.tasks.filter(t=>t.id!==taskId); save(); render(); toast("تم الحذف","info","🗑️"); });
}
function toggleTask(sectionId, roomId, taskId, ev){
  const room = getRoom(getSection(sectionId), roomId);
  const tk = room.tasks.find(t=>t.id===taskId);
  tk.done = !tk.done; save(); buzz(tk.done?16:8);
  // تحديث فوري للكارت فقط (بدون إعادة رسم)
  const cell = ev.target.closest(".item-cell");
  if(cell){
    cell.classList.toggle("sel", tk.done);
    let star = cell.querySelector(".cell-star");
    if(tk.done){
      if(!star){ star=document.createElement("span"); star.className="cell-star"; star.textContent="✨"; cell.appendChild(star); }
      const r=cell.getBoundingClientRect(); sparkle(r.left+r.width/2, r.top+r.height/2);
    } else if(star){ star.remove(); }
  }
  // تحديث زر الحفظ
  const cnt = room.tasks.filter(t=>t.done).length;
  const btn = $("[data-act='save-day-tasks']");
  if(btn){ btn.disabled = !cnt; btn.innerHTML = `💾 حفظ${cnt?` (${cnt})`:""}`; }
}
function saveDayTasks(sectionId, roomId, ev){
  const sec = getSection(sectionId); const room = getRoom(sec, roomId);
  const done = room.tasks.filter(t=>t.done);
  if(!done.length){ toast("حددي مهام أولاً","warn","💡"); return; }
  appendToLog("tasks", done.map(t=> room.name+": "+t.text));
  room.tasks.forEach(t=> t.done=false);
  save();
  const rect = ev.target.getBoundingClientRect();
  sparkle(rect.left+rect.width/2, rect.top+rect.height/2);
  buzz(30); render();
  toast(`تم حفظ ${done.length} إنجاز${selDate!==todayKey()?` (${prettyDate(selDate).full})`:" اليوم"} 💗`,"success","🎉");
}

// نافذة المنتج (اسم + كمية + مبلغ + ملاحظة + تحديد كمشترى)
function itemDialog(opts){
  const {title, text="", qty=1, note="", price=0, bought=false, editing=false, onConfirm} = opts;
  let isBought = bought;
  openModal(`
    <h3>${esc(title)}</h3>
    ${editing?`<div class="field"><button class="buy-toggle ${isBought?'on':''}" id="itBuy">${isBought?'✨ تم شراؤه — اضغطي للإلغاء':'🛒 تحديد كمشترى'}</button></div>`:""}
    <div class="field"><label>اسم العنصر</label><input id="itName" placeholder="مثال: زيت" value="${esc(text)}"></div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>الكمية</label><input id="itQty" type="number" min="1" value="${qty}"></div>
      <div class="field" style="flex:1"><label>المبلغ (ج.م)</label><input id="itPrice" type="number" min="0" step="0.5" placeholder="0" value="${price||""}"></div>
    </div>
    <div class="field"><label>ملاحظة (اختياري)</label><input id="itNote" placeholder="مثال: نوع معين" value="${esc(note)}"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="itCancel">إلغاء</button>
      <button class="btn-confirm" id="itOk">حفظ</button>
    </div>`);
  const buyBtn = $("#itBuy");
  if(buyBtn) buyBtn.onclick = ()=>{
    isBought = !isBought; buzz(12);
    buyBtn.classList.toggle("on", isBought);
    buyBtn.textContent = isBought ? '✨ تم شراؤه — اضغطي للإلغاء' : '🛒 تحديد كمشترى';
  };
  const submit = ()=>{
    const t = $("#itName").value.trim(); if(!t){ $("#itName").focus(); return; }
    closeModal();
    onConfirm(t, Math.max(1, parseInt($("#itQty").value)||1), $("#itNote").value.trim(), Math.max(0, parseFloat($("#itPrice").value)||0), isBought);
  };
  $("#itCancel").onclick = closeModal;
  $("#itOk").onclick = submit;
  $("#itName").addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
  $("#itPrice").addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
}
function addItem(sectionId, listId){

  itemDialog({ title:"عنصر جديد", onConfirm:(text,qty,note,price)=>{
    list.items.push({id:uid(),text,qty,note,price,bought:false}); save(); render(); toast("تمت الإضافة","success","🛒"); }});
}
function editItem(sectionId, listId, itemId){
  const list = getSection(sectionId).lists.find(l=>l.id===listId);
  const it = list.items.find(i=>i.id===itemId);
  itemDialog({ title:"تفاصيل المنتج", text:it.text, qty:it.qty, note:it.note, price:it.price, bought:it.bought, onConfirm:(text,qty,note,price,bought)=>{
    it.text=text; it.qty=qty; it.note=note; it.price=price; it.bought=bought; save(); render(); toast("تم الحفظ","success","💾"); }});
}
function delItem(sectionId, listId, itemId){
  const list = getSection(sectionId).lists.find(l=>l.id===listId);
  const it = list.items.find(i=>i.id===itemId);
  confirmDialog("حذف العنصر؟", `حذف "${it.text}"`,
    ()=>{ list.items = list.items.filter(i=>i.id!==itemId); save(); render(); toast("تم الحذف","info","🗑️"); });
}
function toggleItem(sectionId, listId, itemId, ev){
  const list = getSection(sectionId).lists.find(l=>l.id===listId);
  const it = list.items.find(i=>i.id===itemId);
  it.bought = !it.bought; save(); buzz(it.bought?16:8);
  const cell = ev && ev.target.closest(".item-cell");
  if(cell){
    cell.classList.toggle("sel", it.bought);
    let star = cell.querySelector(".cell-star");
    const qty = cell.querySelector(".cell-qty");
    if(it.bought){
      if(qty) qty.style.display="none";
      if(!star){ star=document.createElement("span"); star.className="cell-star"; star.textContent="✨"; cell.appendChild(star); }
      const r=cell.getBoundingClientRect(); sparkle(r.left+r.width/2, r.top+r.height/2);
    } else {
      if(star) star.remove();
      if(qty) qty.style.display="";
    }
  }
  // تحديث زر حفظ الطلبات (مجموع كل القوائم)
  const sec = getSection(sectionId);
  let cnt=0, sum=0;
  sec.lists.forEach(l=> l.items.forEach(i=>{ if(i.bought){ cnt++; sum += Number(i.price)||0; } }));
  const btn = $("[data-act='save-bought']");
  if(btn){ btn.disabled=!cnt; btn.innerHTML = `🛍️ حفظ${cnt?` (${cnt})`:""}${sum>0?` · ${fmt(sum)} ج.م`:""}`; }
}
function saveBought(sectionId, ev){
  const sec = getSection(sectionId);
  const bought = []; let count = 0, sum = 0;
  sec.lists.forEach(l=> l.items.forEach(i=>{ if(i.bought){ const p = Number(i.price)||0; sum += p; count++; bought.push(i.text + (i.qty>1?` ×${i.qty}`:"") + (p>0?` — ${fmt(p)} ج.م`:"")); } }));
  if(!count){ toast("حددي العناصر المشتراة","warn","💡"); return; }
  if(sum>0) bought.push(`💰 الإجمالي: ${fmt(sum)} ج.م`);
  appendToLog("purchases", bought);
  sec.lists.forEach(l=> l.items.forEach(i=> i.bought=false));
  save();
  const rect = ev.target.getBoundingClientRect();
  sparkle(rect.left+rect.width/2, rect.top+rect.height/2);
  buzz(30); render(); toast(`تم تسجيل ${count} مشترى${sum>0?` بإجمالي ${fmt(sum)} ج.م`:""}${selDate!==todayKey()?` (${prettyDate(selDate).full})`:""} 🛍️`,"success","🎉");
}

function addMeal(sectionId){
  const sec = getSection(sectionId);
  mealDialog({ title:`صنف جديد · ${mealLabel()}`, onConfirm:(text,note)=>{
    sec.meals[mealTab].push({id:uid(),text,note,cooked:false}); save(); render(); toast("تمت الإضافة","success","🍽️"); }});
}
function editMeal(sectionId, mealId){
  const sec = getSection(sectionId); const m = sec.meals[mealTab].find(x=>x.id===mealId);
  mealDialog({ title:"تعديل الصنف", text:m.text, note:m.note, onConfirm:(text,note)=>{
    m.text=text; m.note=note; save(); render(); toast("تم التعديل","success","✏️"); }});
}
function delMeal(sectionId, mealId){
  const sec = getSection(sectionId); const m = sec.meals[mealTab].find(x=>x.id===mealId);
  confirmDialog("حذف الصنف؟", `حذف "${m.text}"`,
    ()=>{ sec.meals[mealTab] = sec.meals[mealTab].filter(x=>x.id!==mealId); save(); render(); toast("تم الحذف","info","🗑️"); });
}
function toggleMeal(sectionId, mealId, ev){
  const sec = getSection(sectionId); const m = sec.meals[mealTab].find(x=>x.id===mealId);
  m.cooked = !m.cooked; save(); buzz(m.cooked?16:8);
  const cell = ev && ev.target.closest(".item-cell");
  if(cell){
    cell.classList.toggle("sel", m.cooked);
    let star = cell.querySelector(".cell-star");
    if(m.cooked){
      if(!star){ star=document.createElement("span"); star.className="cell-star"; star.textContent="✨"; cell.appendChild(star); }
      const r=cell.getBoundingClientRect(); sparkle(r.left+r.width/2, r.top+r.height/2);
    } else if(star){ star.remove(); }
  }
  // تحديث زر حفظ الوجبات (إجمالي عبر كل التبويبات)
  const cnt = ["breakfast","lunch","dinner"].reduce((a,k)=> a + sec.meals[k].filter(x=>x.cooked).length, 0);
  const btn = $("[data-act='save-cooked']");
  if(btn){ btn.disabled = !cnt; btn.innerHTML = `🍲 حفظ${cnt?` (${cnt})`:""}`; }
  else render();
}
function saveCooked(sectionId, ev){
  const sec = getSection(sectionId);
  const cooked = [];
  ["breakfast","lunch","dinner"].forEach(k=> sec.meals[k].forEach(m=>{ if(m.cooked) cooked.push(m.text); }));
  if(!cooked.length){ toast("حددي ما تم طبخه","warn","💡"); return; }
  appendToLog("meals", cooked);
  ["breakfast","lunch","dinner"].forEach(k=> sec.meals[k].forEach(m=> m.cooked=false));
  save();
  const rect = ev.target.getBoundingClientRect();
  sparkle(rect.left+rect.width/2, rect.top+rect.height/2);
  buzz(30); render(); toast(`تم حفظ ${cooked.length} وجبة${selDate!==todayKey()?` (${prettyDate(selDate).full})`:""} 🍲`,"success","🎉");
}

/* ============== السجل ============== */
function delLogDay(date){
  const p = prettyDate(date);
  confirmDialog("حذف سجل اليوم؟", `${p.day} · ${p.full}`,
    ()=>{ data.log = data.log.filter(l=>l.date!==date); save(); render(); toast("تم حذف اليوم","info","🗑️"); });
}
function delLogItem(date, cat, idx){
  const entry = data.log.find(l=>l.date===date);
  if(!entry) return;
  entry[cat].splice(idx,1);
  // حذف اليوم لو أصبح فارغاً
  if(!entry.tasks.length && !entry.purchases.length && !entry.meals.length)
    data.log = data.log.filter(l=>l.date!==date);
  save(); render();
}

/* ============== الإعدادات والبيانات ============== */
function toggleTheme(){
  data.theme = data.theme==="dark" ? "light" : "dark";
  applyTheme(); save(); render();
}
function applyTheme(){
  document.documentElement.setAttribute("data-theme", data.theme);
  $('meta[name=theme-color]').setAttribute("content", data.theme==="dark"?"#1d1626":"#fdf6f8");
}
function renameApp(){
  inputDialog({ title:"اسم التطبيق", value:data.appName, confirmText:"حفظ",
    onConfirm:(name)=>{ data.appName=name; save(); render(); toast("تم تغيير الاسم","success","✏️"); }});
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  downloadBlob(blob, `نسخة-احتياطية-${todayKey()}.json`);
  toast("تم تصدير النسخة","success","⬇️");
}
function exportTXT(){
  let txt = `📔 ${data.appName} — تقرير السجل\n`;
  txt += `تاريخ التصدير: ${prettyDate(todayKey()).full}\n`;
  txt += "=".repeat(34)+"\n\n";
  const logs = data.log.slice().sort((a,b)=> b.date.localeCompare(a.date));
  if(!logs.length) txt += "لا يوجد سجل محفوظ بعد.\n";
  logs.forEach(l=>{
    const p = prettyDate(l.date);
    txt += `📅 ${p.day} — ${p.full}\n`;
    if(l.tasks.length){ txt += "  🧹 المهام المنجزة:\n"; l.tasks.forEach(x=> txt+=`     • ${x}\n`); }
    if(l.purchases.length){ txt += "  🛍️ تم شراؤه:\n"; l.purchases.forEach(x=> txt+=`     • ${x}\n`); }
    if(l.meals.length){ txt += "  🍲 الوجبات:\n"; l.meals.forEach(x=> txt+=`     • ${x}\n`); }
    txt += "\n";
  });
  downloadBlob(new Blob([txt],{type:"text/plain;charset=utf-8"}), `تقرير-${todayKey()}.txt`);
  toast("تم تصدير التقرير","success","🖨️");
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 100);
}
function handleImportFile(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const imported = JSON.parse(reader.result);
      if(!imported.sections) throw 0;
      confirmDialog("استيراد النسخة؟", "سيتم استبدال كل بياناتك الحالية بالنسخة المستوردة.",
        ()=>{ data = imported; applyTheme(); save(); goHome(); toast("تم الاستيراد بنجاح","success","⬆️"); }, false);
    }catch(err){ toast("الملف غير صالح","warn","⚠️"); }
  };
  reader.readAsText(file);
  e.target.value = "";
}
function resetApp(){
  confirmDialog("إعادة ضبط التطبيق؟", "سيتم حذف كل الأقسام والمهام والسجل نهائياً ولا يمكن التراجع.",
    ()=>{ data = defaultData(); applyTheme(); save(); goHome(); toast("تمت إعادة الضبط","info","🔄"); });
}

/* ============== السحب وإعادة الترتيب (يعمل باللمس والماوس) ============== */
function setupSort(container, itemSel, onEnd){
  if(!container) return;
  let dragEl=null, startY=0;

  container.querySelectorAll(itemSel).forEach(item=>{
    // عبر سحب HTML5 (للكمبيوتر)
    item.addEventListener("dragstart", e=>{
      dragEl = item; item.classList.add("dragging");
      e.dataTransfer.effectAllowed="move";
    });
    item.addEventListener("dragend", ()=>{
      item.classList.remove("dragging");
      container.querySelectorAll(itemSel).forEach(x=>x.classList.remove("drag-over"));
      commit();
    });
    item.addEventListener("dragover", e=>{
      e.preventDefault();
      const after = e.clientY > item.getBoundingClientRect().top + item.offsetHeight/2;
      if(dragEl && dragEl!==item){
        if(after) item.after(dragEl); else item.before(dragEl);
      }
    });

    // عبر اللمس (للهواتف) — باستخدام مقبض السحب أو ضغط مطوّل
    const handle = item.querySelector(".drag-handle") || item;
    handle.addEventListener("touchstart", e=>{
      dragEl=item; startY=e.touches[0].clientY; item.classList.add("dragging");
    }, {passive:true});
    item.addEventListener("touchmove", e=>{
      if(!dragEl) return;
      const y = e.touches[0].clientY;
      const els = [...container.querySelectorAll(itemSel)];
      for(const other of els){
        if(other===dragEl) continue;
        const r = other.getBoundingClientRect();
        if(y > r.top && y < r.bottom){
          if(y < r.top + r.height/2) other.before(dragEl); else other.after(dragEl);
          break;
        }
      }
    }, {passive:true});
    item.addEventListener("touchend", ()=>{ if(dragEl){ dragEl.classList.remove("dragging"); commit(); dragEl=null; } });
  });

  function commit(){
    const order = [...container.querySelectorAll(itemSel)].map(x=>x.dataset.id);
    onEnd(order); buzz(10);
  }
}

  w.innerHTML = `

    <h2>أهلاً بكِ 💗</h2>
    <p>منظم المنزل الذكي يساعدك على ترتيب مهام البيت ومتابعة المشتريات والوجبات في مكان واحد.</p>
    <div class="w-features">
      <div class="w-feat"><span>🧹</span> نظّمي مهام كل غرفة واحفظي إنجازك يومياً</div>
      <div class="w-feat"><span>🛒</span> تابعي قوائم المشتريات والكميات</div>
      <div class="w-feat"><span>🍲</span> خطّطي وجبات الأسبوع</div>
      <div class="w-feat"><span>📔</span> سجل يومي لكل ما أنجزتِه</div>
    </div>
    <button class="btn-primary" style="max-width:320px" id="welcomeStart">يلا نبدأ ✨</button>`;
  document.body.appendChild(w);
  $("#welcomeStart").onclick = ()=>{

    w.style.opacity="0"; w.style.transition="opacity .4s";

/* ============== الإقلاع ============== */
function boot(){
  try{
    if(!load()) data = defaultData();   // تحميل البيانات أو إنشاء الافتراضية
    applyTheme();
    render();
  }catch(err){
    console.error("خطأ في الإقلاع:", err);
  }
  // شاشة الترحيب لأول استخدام فقط
  try{ if(!localStorage.getItem("sho_seen")) showWelcome(); }catch(e){}
}

// زر الرجوع في المتصفح/الهاتف يرجع صفحة داخل التطبيق
window.addEventListener("popstate", ()=>{ if(nav.length>1){ back(); try{history.pushState(null,"");}catch(e){} } });
try{ history.pushState(null,""); }catch(e){}

// تشغيل الإقلاع (فوراً لو الصفحة جاهزة، أو عند اكتمال التحميل)
if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
else boot();

// تسجيل الـ Service Worker (يخلّي التطبيق يشتغل كتطبيق كامل وأوفلاين)
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
